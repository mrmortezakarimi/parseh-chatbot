<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پارسه - دستیار هوشمند</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Tahoma, Arial, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; }
.header { background: #16213e; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; color: #e94560; }
.messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.message { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.5; }
.user { background: #e94560; align-self: flex-start; border-radius: 15px 15px 0 15px; }
.bot { background: #16213e; align-self: flex-end; border-radius: 15px 15px 15px 0; }
.input-area { padding: 15px; background: #16213e; display: flex; gap: 10px; }
input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #0f3460; color: #fff; font-size: 16px; outline: none; }
button { padding: 12px 20px; background: #e94560; border: none; border-radius: 25px; color: #fff; font-size: 16px; cursor: pointer; }
.typing { color: #aaa; font-style: italic; }
</style>
</head>
<body>
<div class="header">🤖 پارسه - دستیار هوشمند</div>

<div class="messages" id="messages">
<div class="message bot">سلام! من پارسه هستم، دستیار هوشمند شما. چطور می‌تونم کمکتون کنم؟</div>
</div>

<div class="input-area">
<button onclick="sendMessage()">ارسال</button>
<input type="text" id="userInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.key==='Enter')sendMessage()">
</div>

<!-- ⭐ اینجا فایل chat.js فرانت لود می‌شود -->
<script src="chat.js"></script>

</body>
</html>
